name: CWSGallery
options:
  bundleIdPrefix: com.codewithsandip
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  CWSDesignSystem:
    path: ..

targets:
  CWSGallery:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: CWSDesignSystem
        product: CWSDesignSystem
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.codewithsandip.cwsgallery
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
