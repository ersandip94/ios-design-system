name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build & unit test (host)
        # swift test runs the Swift Testing unit suites. Snapshot tests are gated to iOS
        # (they need a simulator + committed goldens) and run locally — see README.
        run: |
          swift build
          swift test

  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (incl. custom a11y rule)
        run: swiftlint lint --strict

  api-diff:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for public API breakage vs last tag
        run: |
          TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [ -n "$TAG" ]; then
            swift package diagnose-api-breaking-changes "$TAG"
          else
            echo "No release tag yet — skipping API diff."
          fi
