name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build DocC for static hosting
        # Combined docs cover both modules (Foundation tokens + Components) in one site.
        # NOTE: --hosting-base-path MUST equal the GitHub repo name (served at
        # <user>.github.io/<repo>/). Change it here if your repo isn't "codewithsandip-ds-ios".
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --enable-experimental-combined-documentation \
            --target CWSDesignSystemFoundation \
            --target CWSDesignSystem \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path codewithsandip-ds-ios \
            --output-path ./docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
